<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAYX-CLAW // Autonomous Agent</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <link href="/static/persona-manager.css" rel="stylesheet">
  <style>
    :root {
      --neon-pink: #ff2d95;
      --neon-cyan: #00f0ff;
      --neon-purple: #b829ff;
      --neon-green: #39ff14;
      --neon-amber: #ffaa00;
      --neon-red: #ff003c;
      --bg-dark: #0a0a0f;
      --bg-panel: #0d0d14;
      --bg-card: #111119;
      --border-dim: #1a1a2e;
      --text-dim: #4a4a6a;
      --text-mid: #8888aa;
      --text-bright: #e0e0f0;
    }

    body {
      font-family: 'Share Tech Mono', 'Fira Code', monospace;
      background: var(--bg-dark);
      color: var(--text-bright);
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        transparent, transparent 2px,
        rgba(0, 0, 0, 0.03) 2px, rgba(0, 0, 0, 0.03) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    .glow-pink  { text-shadow: 0 0 8px var(--neon-pink), 0 0 20px rgba(255,45,149,0.3); }
    .glow-cyan  { text-shadow: 0 0 8px var(--neon-cyan), 0 0 20px rgba(0,240,255,0.3); }
    .glow-green { text-shadow: 0 0 8px var(--neon-green), 0 0 20px rgba(57,255,20,0.3); }

    .border-glow-cyan { border-color: var(--neon-cyan); box-shadow: 0 0 6px rgba(0,240,255,0.2); }

    .agent-minimax { border-left: 2px solid var(--neon-cyan); }
    .agent-system  { border-left: 2px solid var(--text-dim); }
    .agent-user    { border-left: 2px solid var(--neon-green); }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: var(--neon-cyan); border-radius: 2px; }
    #messages::-webkit-scrollbar-track { background: transparent; }

    pre { tab-size: 4; }

    .badge {
      font-family: 'Orbitron', monospace;
      font-size: 0.55rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 2px;
      border: 1px solid;
    }
    .badge-minimax {
      background: rgba(0,240,255,0.1);
      color: var(--neon-cyan);
      border-color: rgba(0,240,255,0.4);
    }
    .badge-system {
      background: rgba(74,74,106,0.2);
      color: var(--text-dim);
      border-color: rgba(74,74,106,0.3);
    }
    .badge-user {
      background: rgba(57,255,20,0.1);
      color: var(--neon-green);
      border-color: rgba(57,255,20,0.4);
    }
    .badge-tool {
      background: rgba(255,170,0,0.1);
      color: var(--neon-amber);
      border-color: rgba(255,170,0,0.4);
    }
    .badge-subagent {
      background: rgba(184,41,255,0.1);
      color: var(--neon-purple);
      border-color: rgba(184,41,255,0.4);
    }

    .exchange-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      border-bottom: 1px solid var(--border-dim);
      padding-bottom: 1rem;
      margin-bottom: 1rem;
    }
    .exchange-group:first-child { border-bottom: none; }

    .msg-card {
      background: var(--bg-card);
      border-radius: 3px;
      padding: 0.5rem 0.75rem;
    }

    .tool-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      transition: all 0.3s;
    }
    .tool-dot.on  {
      background: var(--neon-green);
      box-shadow: 0 0 6px var(--neon-green), 0 0 12px rgba(57,255,20,0.3);
    }
    .tool-dot.off {
      background: var(--neon-red);
      box-shadow: 0 0 6px var(--neon-red), 0 0 12px rgba(255,0,60,0.3);
    }
    .tool-dot.unknown { background: var(--text-dim); }

    .cyber-input {
      background: var(--bg-panel);
      border: 1px solid var(--border-dim);
      color: var(--text-bright);
      font-family: 'Share Tech Mono', monospace;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .cyber-input:focus {
      outline: none;
      border-color: var(--neon-cyan);
      box-shadow: 0 0 8px rgba(0,240,255,0.2);
    }
    .cyber-input::placeholder { color: var(--text-dim); }

    .cyber-btn {
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      background: transparent;
      border: 1px solid var(--neon-cyan);
      color: var(--neon-cyan);
      transition: all 0.15s;
      cursor: pointer;
    }
    .cyber-btn:hover {
      background: rgba(0,240,255,0.1);
      box-shadow: 0 0 12px rgba(0,240,255,0.3);
    }
    .cyber-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    .cyber-btn-stop {
      border-color: var(--neon-red);
      color: var(--neon-red);
    }
    .cyber-btn-stop:hover {
      background: rgba(255,0,60,0.15);
      box-shadow: 0 0 12px rgba(255,0,60,0.4);
    }
    .cyber-btn-pause {
      border-color: var(--neon-amber);
      color: var(--neon-amber);
    }
    .cyber-btn-pause:hover {
      background: rgba(255,170,0,0.15);
      box-shadow: 0 0 12px rgba(255,170,0,0.4);
    }
    .cyber-btn-resume {
      border-color: var(--neon-green);
      color: var(--neon-green);
    }
    .cyber-btn-resume:hover {
      background: rgba(57,255,20,0.15);
      box-shadow: 0 0 12px rgba(57,255,20,0.4);
    }

    .spinner { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .neon-border-b {
      border-bottom: 1px solid transparent;
      border-image: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple), var(--neon-pink)) 1;
    }
    .dim-border-b { border-bottom: 1px solid var(--border-dim); }

    /* Progress panel */
    .progress-panel {
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border-dim);
      transition: max-height 0.3s ease, opacity 0.3s ease;
      overflow: hidden;
    }
    .progress-panel.hidden { max-height: 0; opacity: 0; padding: 0; }
    .progress-panel.visible { max-height: 400px; opacity: 1; }

    .progress-goal {
      font-family: 'Orbitron', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: var(--neon-cyan);
    }
    .progress-round {
      font-family: 'Orbitron', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      color: var(--neon-amber);
    }
    .progress-note {
      font-size: 0.75rem;
      color: var(--text-mid);
      border-left: 2px solid var(--neon-cyan);
      padding-left: 8px;
      margin: 2px 0;
    }

    .subagent-card {
      background: rgba(184,41,255,0.05);
      border: 1px solid rgba(184,41,255,0.2);
      border-radius: 4px;
      padding: 6px 10px;
      font-size: 0.7rem;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      max-width: 260px;
    }
    .subagent-card .indicator {
      flex-shrink: 0;
      width: 8px; height: 8px;
      margin-top: 2px;
      border-radius: 50%;
      background: var(--neon-purple);
      box-shadow: 0 0 6px var(--neon-purple);
      animation: pulse-dot 1.5s ease-in-out infinite;
    }
    .subagent-card.done .indicator {
      background: var(--neon-green);
      box-shadow: 0 0 6px var(--neon-green);
      animation: none;
    }
    .subagent-card .card-body {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }
    .subagent-card .agent-id {
      font-weight: bold;
      color: var(--text-bright);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .subagent-card .agent-task {
      color: var(--text-dim);
      font-size: 0.65rem;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .subagent-card .agent-tool {
      color: var(--neon-amber);
      font-size: 0.6rem;
      font-family: 'Orbitron', monospace;
      letter-spacing: 0.05em;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Tool Activity Panel */
    .tool-panel {
      background: var(--bg-panel);
      border-left: 1px solid var(--border-dim);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .tool-panel-header {
      font-family: 'Orbitron', monospace;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--neon-amber);
      padding: 8px 12px;
      border-bottom: 1px solid var(--border-dim);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .tool-panel-header .tool-count {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-dim);
    }
    .tool-panel-header .collapse-all-btn {
      background: none;
      border: 1px solid var(--border-dim);
      color: var(--text-dim);
      font-family: 'Orbitron', monospace;
      font-size: 0.45rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 1px 6px;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .tool-panel-header .collapse-all-btn:hover {
      color: var(--neon-amber);
      border-color: rgba(255,170,0,0.4);
    }
    .tool-feed {
      flex: 1;
      overflow-y: auto;
      padding: 6px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .tool-entry.collapsed .tool-entry-input,
    .tool-entry.collapsed .tool-entry-result {
      display: none;
    }
    .tool-entry-toggle {
      margin-left: auto;
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 0.6rem;
      font-family: 'Orbitron', monospace;
      letter-spacing: 0.05em;
      padding: 0 2px;
      transition: color 0.15s;
    }
    .tool-entry-toggle:hover {
      color: var(--neon-amber);
    }
    .tool-entry.clickable {
      cursor: pointer;
    }
    .tool-entry.clickable:hover {
      background: rgba(255,170,0,0.05);
    }
    .msg-card.highlight-flash {
      animation: flash-highlight 1.5s ease-out;
    }
    @keyframes flash-highlight {
      0% { box-shadow: 0 0 0 2px var(--neon-amber), 0 0 12px rgba(255,170,0,0.4); }
      100% { box-shadow: none; }
    }
    .tool-feed::-webkit-scrollbar { width: 3px; }
    .tool-feed::-webkit-scrollbar-thumb { background: var(--neon-amber); border-radius: 2px; }
    .tool-entry {
      background: var(--bg-card);
      border-radius: 3px;
      padding: 6px 8px;
      border-left: 2px solid var(--neon-amber);
      font-size: 0.7rem;
    }
    .tool-entry.tool-delegation {
      border-left-color: var(--neon-purple);
    }
    .tool-entry.tool-progress {
      border-left-color: var(--neon-cyan);
    }
    .tool-entry-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 2px;
    }
    .tool-entry-name {
      font-family: 'Orbitron', monospace;
      font-size: 0.55rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--neon-amber);
    }
    .tool-entry.tool-delegation .tool-entry-name {
      color: var(--neon-purple);
    }
    .tool-entry.tool-progress .tool-entry-name {
      color: var(--neon-cyan);
    }
    .tool-entry-status {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--neon-amber);
      box-shadow: 0 0 4px var(--neon-amber);
      animation: pulse-dot 1s ease-in-out infinite;
    }
    .tool-entry-status.done {
      background: var(--neon-green);
      box-shadow: 0 0 4px var(--neon-green);
      animation: none;
    }
    .tool-entry-input {
      color: var(--text-dim);
      font-size: 0.65rem;
      max-height: 3rem;
      overflow: hidden;
      word-break: break-all;
    }
    .tool-entry-result {
      color: var(--text-mid);
      font-size: 0.65rem;
      max-height: 4rem;
      overflow-y: auto;
      margin-top: 3px;
      padding-top: 3px;
      border-top: 1px solid var(--border-dim);
      white-space: pre-wrap;
      word-break: break-all;
    }
    .tool-entry-result::-webkit-scrollbar { width: 2px; }
    .tool-entry-result::-webkit-scrollbar-thumb { background: var(--text-dim); }

    /* Main content split layout */
    .main-split {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1.5rem;
      min-width: 0;
    }
    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--neon-cyan); border-radius: 2px; }
    .tool-panel { width: 320px; min-width: 180px; max-width: 600px; }
    .tool-panel.collapsed { width: 0; min-width: 0; overflow: hidden; border: none; }

    /* Drag handle */
    .resize-handle {
      width: 5px;
      cursor: col-resize;
      background: var(--border-dim);
      flex-shrink: 0;
      transition: background 0.15s;
      position: relative;
    }
    .resize-handle:hover, .resize-handle.dragging {
      background: var(--neon-amber);
      box-shadow: 0 0 6px rgba(255,170,0,0.3);
    }

    /* Inline command pills in chat bubbles */
    .bubble-commands {
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid var(--border-dim);
    }
    .bubble-commands-header {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      padding: 2px 0;
      user-select: none;
    }
    .bubble-commands-header:hover .bc-label {
      color: var(--neon-amber);
    }
    .bc-arrow {
      font-size: 0.5rem;
      color: var(--text-dim);
      transition: transform 0.2s;
    }
    .bubble-commands.open .bc-arrow {
      transform: rotate(90deg);
    }
    .bc-label {
      font-family: 'Orbitron', monospace;
      font-size: 0.5rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      transition: color 0.15s;
    }
    .bc-count {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.6rem;
      color: var(--neon-amber);
    }
    .bubble-commands-groups {
      display: none;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 4px;
    }
    .bubble-commands.open .bubble-commands-groups {
      display: flex;
    }
    /* Group pill - the collapsed summary for a tool name */
    .cmd-group-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-family: 'Orbitron', monospace;
      font-size: 0.5rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 2px 8px;
      border-radius: 2px;
      border: 1px solid rgba(255,170,0,0.3);
      background: rgba(255,170,0,0.06);
      color: var(--neon-amber);
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.15s;
    }
    .cmd-group-pill:hover {
      background: rgba(255,170,0,0.15);
      border-color: var(--neon-amber);
    }
    .cmd-group-pill .cmd-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--neon-amber);
      animation: pulse-dot 1s ease-in-out infinite;
    }
    .cmd-group-pill.all-done .cmd-dot {
      background: var(--neon-green);
      animation: none;
    }
    .cmd-group-pill .cmd-group-count {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.55rem;
      color: var(--text-mid);
      margin-left: 2px;
    }
    /* Expanded call list under a group */
    .cmd-group-wrapper {
      display: inline-flex;
      flex-direction: column;
    }
    .cmd-group-calls {
      display: none;
      flex-direction: column;
      gap: 2px;
      margin-top: 3px;
      padding-left: 8px;
      border-left: 1px solid rgba(255,170,0,0.2);
    }
    .cmd-group-wrapper.open .cmd-group-calls {
      display: flex;
    }
    .cmd-call-item {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.55rem;
      color: var(--text-mid);
      padding: 1px 6px;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .cmd-call-item:hover {
      color: var(--neon-amber);
      background: rgba(255,170,0,0.08);
    }
    .cmd-call-item .call-dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--neon-amber);
      animation: pulse-dot 1s ease-in-out infinite;
      flex-shrink: 0;
    }
    .cmd-call-item.done .call-dot {
      background: var(--neon-green);
      animation: none;
    }

    /* Sub-agent groups in activity panel */
    .subagent-group {
      border: 1px solid rgba(184,41,255,0.2);
      border-radius: 3px;
      margin-bottom: 2px;
    }
    .subagent-group-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 8px;
      background: rgba(184,41,255,0.06);
      cursor: pointer;
      transition: background 0.15s;
    }
    .subagent-group-header:hover {
      background: rgba(184,41,255,0.12);
    }
    .subagent-group-header .sg-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--neon-purple);
      box-shadow: 0 0 4px var(--neon-purple);
      animation: pulse-dot 1.5s ease-in-out infinite;
    }
    .subagent-group-header.done .sg-dot {
      background: var(--neon-green);
      box-shadow: 0 0 4px var(--neon-green);
      animation: none;
    }
    .subagent-group-header .sg-name {
      font-family: 'Orbitron', monospace;
      font-size: 0.55rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--neon-purple);
    }
    .subagent-group-header .sg-count {
      margin-left: auto;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.6rem;
      color: var(--text-dim);
    }
    .subagent-group-header .sg-arrow {
      color: var(--text-dim);
      font-size: 0.6rem;
      transition: transform 0.15s;
    }
    .subagent-group.collapsed .sg-arrow { transform: rotate(-90deg); }
    .subagent-group-body {
      padding: 4px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .subagent-group.collapsed .subagent-group-body { display: none; }

    @media (max-width: 768px) {
      .main-split { flex-direction: column; }
      .tool-panel { width: 100% !important; max-width: 100%; max-height: 250px; border-left: none; border-top: 1px solid var(--border-dim); }
      .resize-handle { display: none; }
    }

    /* Settings panel */
    .settings-panel {
      transition: max-height 0.2s ease, opacity 0.2s ease;
      overflow: hidden;
    }
    .settings-panel.closed { max-height: 0; opacity: 0; }
    .settings-panel.open { max-height: 300px; opacity: 1; }

    /* Status badges in progress */
    .status-running {
      color: var(--neon-cyan);
      border-color: rgba(0,240,255,0.4);
    }
    .status-paused {
      color: var(--neon-amber);
      border-color: rgba(255,170,0,0.4);
    }
    .status-completed {
      color: var(--neon-green);
      border-color: rgba(57,255,20,0.4);
    }
    .status-cancelled {
      color: var(--neon-red);
      border-color: rgba(255,0,60,0.4);
    }
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <!-- Header -->
  <header class="neon-border-b px-6 py-3 flex items-center justify-between shrink-0" style="background: var(--bg-panel)">
    <div class="flex items-center gap-3">
      <h1 id="header-title" class="text-sm font-black tracking-widest glow-cyan" style="font-family:'Orbitron',monospace">SOPHIA</h1>
      <span class="text-xs" style="color: var(--text-dim)">// AUTONOMOUS AGENT</span>
      <span class="badge badge-minimax">MINIMAX M2.5</span>
    </div>
    <div class="flex items-center gap-4">
      <div id="tool-indicators" class="flex items-center gap-2"></div>
      <div class="flex items-center gap-2">
        <span id="status-dot" class="w-2 h-2 rounded-full" style="background: var(--text-dim)"></span>
        <span id="status-text" class="text-xs" style="color: var(--text-dim)">CONNECTING...</span>
      </div>
      <button id="settings-toggle" class="transition-colors" style="color: var(--text-dim)" title="Settings">
        <svg class="w-4 h-4 hover:drop-shadow-[0_0_6px_rgba(0,240,255,0.5)]" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="transition: filter 0.2s">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>

  </header>

  <!-- Settings panel (collapsible) -->
  <div id="settings-panel" class="settings-panel closed dim-border-b" style="background: var(--bg-panel)">
    <div class="px-6 py-4 max-w-4xl mx-auto flex flex-col gap-3">
      <div class="flex items-center gap-4">
        <label class="text-xs" style="color: var(--text-dim); font-family:'Orbitron',monospace; font-size:0.6rem; letter-spacing:0.1em; min-width:70px">PERSONA</label>
        <span id="active-persona-name" class="badge badge-minimax"></span>
        <button id="persona-manager-btn" class="cyber-btn px-3 py-1 rounded text-xs">MANAGE</button>
        <span id="persona-status" class="text-xs" style="color: var(--neon-green)"></span>
      </div>
    </div>
  </div>

  <!-- Persona Manager Panel -->
  <div id="persona-panel" class="persona-panel closed" style="background: var(--bg-panel)">
    <div class="px-6 py-4">
      <!-- Grid view -->
      <div id="persona-grid-view">
        <div class="panel-header">
          <span class="panel-title">PERSONAS</span>
          <button id="persona-close-btn" class="btn-back">CLOSE</button>
        </div>
        <div id="persona-grid" class="persona-grid"></div>
      </div>
      <!-- Editor view -->
      <div id="persona-editor-view" class="hidden">
        <div class="panel-header">
          <button id="persona-back-btn" class="btn-back">BACK</button>
          <span id="persona-editor-title" class="panel-title">NEW PERSONA</span>
          <div style="width:60px"></div>

        <div class="persona-editor">
          <div class="editor-tabs">
            <button class="editor-tab active" data-tab="identity">Identity</button>
            <button class="editor-tab" data-tab="personality">Personality</button>
            <button class="editor-tab" data-tab="role">Role</button>

              <label class="field-label">Greeting</label>
              <input type="text" id="p-greeting" class="field-input" placeholder="e.g., Hey! I'm Sophia.">

          <div id="tab-personality" class="tab-content">
            <div class="field-group">
              <label class="field-label">Tone</label>
              <input type="text" id="p-tone" class="field-input" placeholder="e.g., professional yet approachable">
            </div>
            <div class="field-group">
              <label class="field-label">Style</label>
              <input type="text" id="p-style" class="field-input" placeholder="e.g., concise and direct">
            </div>
            <div class="field-group">
              <label class="field-label">Traits (one per line)</label>
              <textarea id="p-traits" class="field-input" placeholder="e.g.,&#10;- Helpful and proactive&#10;- Plans before executing"></textarea>

          <div id="tab-role" class="tab-content">
            <div class="field-group">
              <label class="field-label">Description</label>

              <label class="field-label">Instructions (one per line)</label>

            <div class="field-group">
              <label class="field-label">Do (one per line)</label>
              <textarea id="p-guardrails-do" class="field-input" placeholder="e.g.,&#10;- Verify agent output&#10;- Save context to memory"></textarea>
            </div>
            <div class="field-group">
              <label class="field-label">Don't (one per line)</label>
              <textarea id="p-guardrails-dont" class="field-input" placeholder="e.g.,&#10;- Expose API keys&#10;- Make up information"></textarea>
            </div>

          <div id="tab-ui" class="tab-content">
            <div class="field-row">
              <div class="field-group">
                <label class="field-label">Avatar Emoji</label>

          <div class="editor-actions">
            <button id="persona-activate-btn" class="btn-save btn-activate">ACTIVATE</button>
            <button id="persona-save-btn" class="btn-save">SAVE</button>

  <!-- Autonomous Progress Panel -->
  <div id="progress-panel" class="progress-panel hidden">
    <div class="px-6 py-3 flex flex-col gap-2">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div id="progress-spinner" class="spinner w-3 h-3 border border-t-transparent rounded-full hidden" style="border-color: var(--neon-cyan); border-top-color: transparent"></div>
          <span id="progress-status" class="badge badge-minimax">IDLE</span>
          <span id="progress-goal" class="progress-goal"></span>
        </div>
        <div class="flex items-center gap-2">
          <span id="progress-round" class="progress-round"></span>
          <button id="pause-btn" class="cyber-btn cyber-btn-pause px-3 py-1 rounded text-xs hidden">PAUSE</button>
          <button id="resume-btn" class="cyber-btn cyber-btn-resume px-3 py-1 rounded text-xs hidden">RESUME</button>
          <button id="cancel-btn" class="cyber-btn cyber-btn-stop px-3 py-1 rounded text-xs hidden">CANCEL</button>
        </div>
      </div>
      <!-- Sub-agent cards -->

      <div id="progress-notes" class="flex flex-col gap-1 max-h-24 overflow-y-auto"></div>

  <!-- Input (always active) -->
  <div class="dim-border-b p-4 shrink-0" style="background: var(--bg-panel)">
    <form id="form" class="flex gap-3 max-w-4xl mx-auto">
      <input id="input" type="text" placeholder="// ENTER TASK OR MESSAGE..."
             autocomplete="off"
             class="cyber-input flex-1 rounded px-4 py-2.5 text-sm">
      <button id="send-btn" type="submit" class="cyber-btn px-6 py-2.5 rounded">
        EXEC
      </button>
    </form>
  </div>

  <!-- Activity indicator -->
  <div id="activity-bar" class="hidden dim-border-b px-6 py-2 shrink-0" style="background: rgba(0,240,255,0.03)">
    <div class="flex items-center gap-2">
      <div class="spinner w-3 h-3 border border-t-transparent rounded-full" style="border-color: var(--neon-cyan); border-top-color: transparent"></div>
      <span id="activity-text" class="text-xs" style="color: var(--neon-cyan); font-family:'Orbitron',monospace; font-size:0.6rem; letter-spacing:0.08em"></span>
    </div>
  </div>

  <!-- Main split: Chat + Tool Panel -->
  <div class="main-split">
    <main id="messages" class="chat-area">
      <div id="placeholder" class="text-center text-xs py-12" style="color: var(--text-dim)">
        <div style="font-family:'Orbitron',monospace; font-size:0.65rem; letter-spacing:0.15em; margin-bottom:0.5rem" class="glow-cyan">AUTONOMOUS AGENT READY</div>
        <div>MiniMax M2.5 orchestrator online. Enter a task — the agent will plan, execute, and complete it autonomously.</div>
        <div style="margin-top:0.5rem; color: var(--text-dim)">You can send messages at any time to guide the agent mid-execution.</div>
      </div>
    </main>
    <div class="resize-handle" id="resize-handle"></div>
    <aside id="tool-panel" class="tool-panel">
      <div class="tool-panel-header">
        <span>ACTIVITY</span>
        <span id="tool-count" class="tool-count"></span>
        <button id="collapse-all-btn" class="collapse-all-btn" title="Collapse all entries">COLLAPSE ALL</button>
      </div>
      <div id="tool-feed" class="tool-feed"></div>
    </aside>
  </div>

  <script>
    const messagesEl   = document.getElementById('messages');
    const placeholder  = document.getElementById('placeholder');
    const form         = document.getElementById('form');
    const input        = document.getElementById('input');
    const sendBtn      = document.getElementById('send-btn');
    const statusDot    = document.getElementById('status-dot');
    const statusText   = document.getElementById('status-text');
    const activityBar  = document.getElementById('activity-bar');
    const activityText = document.getElementById('activity-text');
    const headerTitle  = document.getElementById('header-title');
    const toolIndicators = document.getElementById('tool-indicators');
    const settingsToggle = document.getElementById('settings-toggle');
    const settingsPanel  = document.getElementById('settings-panel');
    const personaStatus  = document.getElementById('persona-status');
    const activePersonaNameEl = document.getElementById('active-persona-name');

    // Progress panel elements
    const progressPanel   = document.getElementById('progress-panel');
    const progressSpinner = document.getElementById('progress-spinner');
    const progressStatus  = document.getElementById('progress-status');
    const progressGoal    = document.getElementById('progress-goal');
    const progressRound   = document.getElementById('progress-round');
    const progressNotes   = document.getElementById('progress-notes');
    const subagentCards   = document.getElementById('subagent-cards');
    const pauseBtn        = document.getElementById('pause-btn');
    const resumeBtn       = document.getElementById('resume-btn');
    const cancelBtn       = document.getElementById('cancel-btn');
    const toolFeed        = document.getElementById('tool-feed');
    const toolCountEl     = document.getElementById('tool-count');

    let toolCallCount = 0;
    const pendingToolEntries = new Map(); // tool_name -> DOM element for pairing use/result

    let personaName = 'Sophia';
    let personaColor = '#00f0ff';
    let personaEmoji = '';

    const AGENTS = {
      user:    { label: () => 'You',        badgeClass: 'badge-user',    borderClass: 'agent-user'    },
      minimax: { label: () => personaName,   badgeClass: 'badge-minimax', borderClass: 'agent-minimax' },
      system:  { label: () => 'System',      badgeClass: 'badge-system',  borderClass: 'agent-system'  },
    };

    let ws = null;
    let currentGroup = null;
    const activeBubbles = new Map();
    const knownSubagents = new Map();
    let bubbleIdCounter = 0;
    let currentBubbleId = null;

    // Persona manager state
    let personas = [];
    let activePersonaId = 'default';
    let editingPersonaId = null;

    const personaPanel = document.getElementById('persona-panel');
    const personaGridView = document.getElementById('persona-grid-view');
    const personaEditorView = document.getElementById('persona-editor-view');
    const personaGrid = document.getElementById('persona-grid');
    const personaManagerBtn = document.getElementById('persona-manager-btn');
    const personaCloseBtn = document.getElementById('persona-close-btn');
    const personaBackBtn = document.getElementById('persona-back-btn');
    const personaEditorTitle = document.getElementById('persona-editor-title');
    const personaActivateBtn = document.getElementById('persona-activate-btn');
    const personaSaveBtn = document.getElementById('persona-save-btn');
    const personaDeleteBtn = document.getElementById('persona-delete-btn');
    const personaEditorStatus = document.getElementById('persona-editor-status');

    /* ---- Seamless Persona Application ---- */

    function applyPersona(info) {
      personaName = info.name || personaName;
      personaColor = info.primary_color || personaColor;
      personaEmoji = info.avatar_emoji || '';

      // Update header
      headerTitle.textContent = personaName.toUpperCase();

      // Update active badge in settings
      activePersonaNameEl.textContent = (personaEmoji ? personaEmoji + ' ' : '') + personaName;

      // Update CSS custom property for accent color
      document.documentElement.style.setProperty('--neon-cyan', personaColor);

      // Update page title
      document.title = `${personaName.toUpperCase()} // Autonomous Agent`;
    }

    /* ---- Settings Panel ---- */

    settingsToggle.addEventListener('click', (e) => {
      e.stopPropagation();
      settingsPanel.classList.toggle('closed');
      settingsPanel.classList.toggle('open');
    });

    /* ---- Persona Manager ---- */

    // Tab switching
    document.querySelectorAll('.editor-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.editor-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
      });
    });

    async function loadPersonas() {
      try {
        const r = await fetch('/api/personas');
        personas = await r.json();
        activePersonaId = personas.find(p => p.active)?.id || 'default';
        renderPersonaGrid();
      } catch (e) {
        console.error('Failed to load personas:', e);
      }
    }

    function renderPersonaGrid() {
      personaGrid.innerHTML = '';
      personas.forEach(p => {
        const card = document.createElement('div');
        card.className = 'persona-card' + (p.id === activePersonaId ? ' active' : '');
        card.innerHTML = `
          <span class="emoji">${p.avatar_emoji || ''}</span>
          <div class="card-name">${p.name}</div>
          <div class="card-tagline">${p.tagline || ''}</div>
          ${p.id === activePersonaId ? '<span class="active-badge">ACTIVE</span>' : ''}
          <span class="color-dot" style="background:${p.primary_color || '#00f0ff'}"></span>
        `;
        card.addEventListener('click', () => openPersonaEditor(p.id));
        personaGrid.appendChild(card);
      });
      const newCard = document.createElement('div');
      newCard.className = 'persona-card persona-card-new';
      newCard.innerHTML = '<span class="plus">+</span><span class="label">NEW PERSONA</span>';
      newCard.addEventListener('click', () => openPersonaEditor(null));
      personaGrid.appendChild(newCard);
    }

    async function openPersonaEditor(id) {
      editingPersonaId = id;
      personaGridView.classList.add('hidden');
      personaEditorView.classList.remove('hidden');

      if (id) {
        // Fetch full persona data from API for editing
        let p;
        try {
          const r = await fetch('/api/personas/' + id);
          p = await r.json();
        } catch (e) {
          p = personas.find(x => x.id === id) || {};
        }

        personaEditorTitle.textContent = 'EDIT: ' + (p.name || id).toUpperCase();
        personaDeleteBtn.classList.toggle('hidden', id === 'default');
        personaActivateBtn.classList.remove('hidden');

        document.getElementById('p-name').value = p.name || '';
        document.getElementById('p-tagline').value = p.tagline || '';
        document.getElementById('p-greeting').value = p.greeting || '';
        document.getElementById('p-tone').value = p.personality?.tone || '';
        document.getElementById('p-style').value = p.personality?.style || '';
        document.getElementById('p-traits').value = (p.personality?.traits || []).join('\n');
        document.getElementById('p-role-desc').value = p.role?.description || '';
        document.getElementById('p-instructions').value = (p.role?.instructions || []).join('\n');
        document.getElementById('p-guardrails-do').value = (p.guardrails?.do || []).join('\n');
        document.getElementById('p-guardrails-dont').value = (p.guardrails?.dont || []).join('\n');
        document.getElementById('p-avatar-emoji').value = p.ui?.avatar_emoji || '';
        document.getElementById('p-primary-color').value = p.ui?.primary_color || '#00f0ff';
        document.getElementById('p-theme').value = p.ui?.theme || 'dark';
      } else {
        personaEditorTitle.textContent = 'NEW PERSONA';
        personaDeleteBtn.classList.add('hidden');
        personaActivateBtn.classList.add('hidden');
        ['p-name','p-tagline','p-greeting','p-tone','p-style','p-traits','p-role-desc','p-instructions','p-guardrails-do','p-guardrails-dont','p-avatar-emoji','p-primary-color'].forEach(fid => {
          document.getElementById(fid).value = '';
        });
        document.getElementById('p-theme').value = 'dark';
        document.getElementById('p-primary-color').value = '#00f0ff';
      }
      personaEditorStatus.textContent = '';
    }

    function closePersonaEditor() {
      editingPersonaId = null;
      personaEditorView.classList.add('hidden');
      personaGridView.classList.remove('hidden');
    }

    function collectPersonaData() {
      const parseList = (id) => document.getElementById(id).value.split('\n').filter(x => x.trim());
      return {
        name: document.getElementById('p-name').value || 'Unnamed',
        tagline: document.getElementById('p-tagline').value,
        greeting: document.getElementById('p-greeting').value,
        personality: {
          tone: document.getElementById('p-tone').value,
          style: document.getElementById('p-style').value,
          traits: parseList('p-traits'),
        },
        role: {
          description: document.getElementById('p-role-desc').value,
          instructions: parseList('p-instructions'),
        },
        guardrails: {
          do: parseList('p-guardrails-do'),
          dont: parseList('p-guardrails-dont'),
        },
        ui: {
          avatar_emoji: document.getElementById('p-avatar-emoji').value,
          primary_color: document.getElementById('p-primary-color').value,
          theme: document.getElementById('p-theme').value,
        },
      };
    }

    personaManagerBtn.addEventListener('click', () => {
      personaPanel.classList.toggle('closed');
      personaPanel.classList.toggle('open');
      if (personaPanel.classList.contains('open')) {
        loadPersonas();
        // Close settings when opening persona manager
        settingsPanel.classList.add('closed');
        settingsPanel.classList.remove('open');
      }
    });

    personaCloseBtn.addEventListener('click', () => {
      personaPanel.classList.remove('open');
      personaPanel.classList.add('closed');
      closePersonaEditor();
    });

    personaBackBtn.addEventListener('click', closePersonaEditor);

    // ACTIVATE — seamless via WebSocket
    personaActivateBtn.addEventListener('click', () => {
      if (!editingPersonaId) return;
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        personaEditorStatus.textContent = 'NOT CONNECTED';
        personaEditorStatus.className = 'status-msg error';
        return;
      }
      ws.send(JSON.stringify({ type: 'switch_persona', content: editingPersonaId }));
      activePersonaId = editingPersonaId;

      // Immediately apply from form fields (instant feel)
      applyPersona({
        name: document.getElementById('p-name').value,
        primary_color: document.getElementById('p-primary-color').value,
        avatar_emoji: document.getElementById('p-avatar-emoji').value,
      });

      personaEditorStatus.textContent = 'ACTIVATED';
      personaEditorStatus.className = 'status-msg success';
      setTimeout(() => { personaEditorStatus.textContent = ''; }, 2000);

      // Refresh grid to show new active state
      loadPersonas();
    });

    personaSaveBtn.addEventListener('click', async () => {
      const data = collectPersonaData();
      try {
        let r;
        if (editingPersonaId) {
          r = await fetch('/api/personas/' + editingPersonaId, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data),
          });
        } else {
          const newId = data.name.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
          r = await fetch('/api/personas', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: newId, ...data }),
          });
        }
        if (r.ok) {
          personaEditorStatus.textContent = 'SAVED';
          personaEditorStatus.className = 'status-msg success';
          loadPersonas();
          if (!editingPersonaId) {
            const result = await r.json();
            openPersonaEditor(result.id);
          }
          // If saved persona is the active one, re-apply it live
          if (editingPersonaId === activePersonaId) {
            applyPersona({
              name: data.name,
              primary_color: data.ui.primary_color,
              avatar_emoji: data.ui.avatar_emoji,
            });
            // Also tell server to reload the persona
            if (ws && ws.readyState === WebSocket.OPEN) {
              ws.send(JSON.stringify({ type: 'switch_persona', content: editingPersonaId }));
            }
          }
          setTimeout(() => { personaEditorStatus.textContent = ''; }, 2000);
        } else {
          const err = await r.json();
          personaEditorStatus.textContent = err.detail || 'ERROR';
          personaEditorStatus.className = 'status-msg error';
        }
      } catch (e) {
        personaEditorStatus.textContent = 'ERROR';
        personaEditorStatus.className = 'status-msg error';
      }
    });

    personaDeleteBtn.addEventListener('click', async () => {
      if (!editingPersonaId || editingPersonaId === 'default') return;
      if (!confirm('Delete this persona?')) return;
      try {
        const r = await fetch('/api/personas/' + editingPersonaId, { method: 'DELETE' });
        if (r.ok) {
          closePersonaEditor();
          loadPersonas();
        }
      } catch (e) {
        personaEditorStatus.textContent = 'DELETE ERROR';
        personaEditorStatus.className = 'status-msg error';
      }
    });

    /* ---- Progress Panel ---- */

    function updateTaskState(state) {
      if (!state) return;

      const isActive = ['running', 'paused'].includes(state.status);
      progressPanel.classList.toggle('hidden', !isActive && state.status !== 'completed');
      progressPanel.classList.toggle('visible', isActive || state.status === 'completed');

      progressStatus.textContent = state.status.toUpperCase();
      progressStatus.className = 'badge';
      if (state.status === 'running') {
        progressStatus.classList.add('status-running');
        progressSpinner.classList.remove('hidden');
      } else {
        progressSpinner.classList.add('hidden');
        if (state.status === 'paused') progressStatus.classList.add('status-paused');
        else if (state.status === 'completed') progressStatus.classList.add('status-completed');
        else if (state.status === 'cancelled') progressStatus.classList.add('status-cancelled');
      }

      progressGoal.textContent = state.current_goal || '';

      if (state.round_number > 0) {
        progressRound.textContent = `ROUND ${state.round_number}`;
      }

      pauseBtn.classList.toggle('hidden', state.status !== 'running');
      resumeBtn.classList.toggle('hidden', state.status !== 'paused');
      cancelBtn.classList.toggle('hidden', !isActive);

      if (state.subagents_active && state.subagents_active.length > 0) {
        state.subagents_active.forEach(id => {
          if (!knownSubagents.has(id)) knownSubagents.set(id, { status: 'running', task: '' });
        });
      }
      renderSubagentCards();

      if (state.progress_notes) {
        const recent = state.progress_notes.slice(-5);
        progressNotes.innerHTML = recent.map(n =>
          `<div class="progress-note">${escapeHtml(n)}</div>`
        ).join('');
      }
    }

    function renderSubagentCards() {
      subagentCards.innerHTML = '';
      knownSubagents.forEach((info, id) => {
        const status = typeof info === 'string' ? info : info.status;
        const task = typeof info === 'string' ? '' : (info.task || '');
        const currentTool = typeof info === 'object' ? (info.currentTool || '') : '';
        const card = document.createElement('div');
        card.className = `subagent-card ${status === 'completed' ? 'done' : ''}`;
        const icon = status === 'completed' ? '\u2713' : '';
        const taskHtml = task ? `<div class="agent-task" title="${escapeHtml(task)}">${escapeHtml(task)}</div>` : '';
        const toolHtml = currentTool ? `<div class="agent-tool">\u25B6 ${escapeHtml(currentTool)}</div>` : '';
        card.innerHTML = `<span class="indicator">${icon}</span><div class="card-body"><span class="agent-id">${escapeHtml(id)}</span>${taskHtml}${toolHtml}</div>`;
        subagentCards.appendChild(card);
      });
    }

    /* ---- Control Buttons ---- */

    pauseBtn.addEventListener('click', () => {
      if (ws) ws.send(JSON.stringify({ type: 'pause' }));
    });

    resumeBtn.addEventListener('click', () => {
      if (ws) ws.send(JSON.stringify({ type: 'resume' }));
    });

    cancelBtn.addEventListener('click', () => {
      if (ws) ws.send(JSON.stringify({ type: 'cancel' }));
    });

    /* ---- WebSocket ---- */

    async function fetchPersona() {
      try {
        const r = await fetch('/api/personas/active');
        const data = await r.json();
        activePersonaId = data.id || 'default';
        applyPersona(data);
      } catch (e) {
        console.error('Failed to fetch persona:', e);
      }
    }

    async function fetchStatus() {
      try {
        const r = await fetch('/api/status');
        const statuses = await r.json();
        toolIndicators.innerHTML = '';
        for (const [key, info] of Object.entries(statuses)) {
          const dot = document.createElement('div');
          dot.className = `tool-dot ${info.ok ? 'on' : 'off'}`;
          dot.title = info.desc;
          toolIndicators.appendChild(dot);
        }
      } catch (e) {
        console.error('Failed to fetch status:', e);
      }
    }

    let reconnectDelay = 1000;
    const MAX_RECONNECT_DELAY = 30000;

    function connect() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const params = new URLSearchParams(location.search);
      const token = params.get('token') || '';
      const tokenParam = token ? `?token=${encodeURIComponent(token)}` : '';
      ws = new WebSocket(`${protocol}//${location.host}/ws${tokenParam}`);

      ws.onopen = () => {
        statusDot.style.background = 'var(--neon-green)';
        statusText.textContent = 'CONNECTED';
        statusText.style.color = 'var(--neon-green)';
        reconnectDelay = 1000;
      };

      ws.onclose = (e) => {
        statusDot.style.background = 'var(--neon-red)';
        statusText.style.color = 'var(--neon-red)';
        ws = null;
        if (e.code === 4001) {
          statusText.textContent = 'UNAUTHORIZED';
          return;
        }
        statusText.textContent = `RECONNECTING (${Math.round(reconnectDelay/1000)}s)...`;
        setTimeout(connect, reconnectDelay);
        reconnectDelay = Math.min(reconnectDelay * 1.5, MAX_RECONNECT_DELAY);
      };

      ws.onerror = (e) => {
        console.error('WebSocket error:', e);
      };

      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        handleWSMessage(msg);
      };
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function handleWSMessage(msg) {
      if (msg.type === 'history') {
        placeholder.remove();
        messagesEl.innerHTML = '';
        for (const exchange of msg.history) {
          addMessage({ agent: 'user', content: exchange.user });
          if (typeof exchange.assistant === 'string') {
            addMessage({ agent: 'minimax', content: exchange.assistant });
          }
        }
        return;
      }

      if (msg.type === 'task_state') {
        updateTaskState(msg.task_state);
        return;
      }

      if (msg.type === 'progress') {
        updateTaskState(msg.task_state);
        return;
      }

      if (msg.type === 'await_confirm') {
        // Legacy — loop now auto-continues
        activityBar.classList.remove('hidden');
        activityText.textContent = msg.content || 'Agent working...';
        return;
      }

      if (msg.type === 'persona_update') {
        // Server confirmed persona switch — apply it
        try {
          const info = JSON.parse(msg.content);
          applyPersona(info);
        } catch (e) {
          console.error('Failed to parse persona_update:', e);
        }
        return;
      }

      if (msg.type === 'subagent_event') {
        try {
          const evt = JSON.parse(msg.content);
          if (evt.action === 'spawned') {
            knownSubagents.set(evt.agent_id, { status: 'running', task: evt.task || '' });
            getOrCreateSubagentGroup(evt.agent_id);
          } else if (evt.action === 'completed') {
            const existing = knownSubagents.get(evt.agent_id);
            knownSubagents.set(evt.agent_id, { status: 'completed', task: existing ? existing.task : '' });
            markSubagentGroupDone(evt.agent_id);
          }
        } catch (e) {
          const [action, agentId] = msg.content.split(':');
          if (action === 'spawned') {
            knownSubagents.set(agentId, { status: 'running', task: '' });
            getOrCreateSubagentGroup(agentId);
          } else if (action === 'completed') {
            const existing = knownSubagents.get(agentId);
            knownSubagents.set(agentId, { status: 'completed', task: existing ? existing.task : '' });
            markSubagentGroupDone(agentId);
          }
        }
        renderSubagentCards();
        return;
      }

      const agent = msg.agent || 'system';

      if (msg.type === 'status') {
        activityBar.classList.remove('hidden');
        activityText.textContent = msg.content;
        // New round — start a fresh bubble for the next chunk
        if (msg.content.includes('thinking...')) {
          activeBubbles.delete('main');
          currentGroup = null;
        }
        // Track sub-agent tool usage from status messages like "Sub-agent [X] running tool..."
        const subMatch = msg.content.match(/Sub-agent \[(.+?)\] running (.+?)\.\.\./);
        if (subMatch) {
          const [, agentId, toolName] = subMatch;
          const existing = knownSubagents.get(agentId);
          if (existing) {
            existing.currentTool = toolName;
            renderSubagentCards();
          }
        }
        return;
      }

      if (msg.type === 'chunk' || msg.type === 'stream') {
        const isSubagent = !!msg.tool_name;
        if (isSubagent) {
          // Sub-agent output goes to the activity panel
          addSubagentOutput(msg.tool_name, msg.content);
        } else {
          // Main agent output goes to the chat area
          const bubbleKey = 'main';
          let bubble = activeBubbles.get(bubbleKey);
          if (!bubble) {
            bubble = createBubble(agent);
            activeBubbles.set(bubbleKey, bubble);
          }
          const content = bubble.querySelector('.msg-content');
          content.textContent += msg.content;
          content.scrollTop = content.scrollHeight;
        }
        return;
      }

      if (msg.type === 'tool_use') {
        addToolEntry(msg.tool_name || 'unknown', msg.tool_input);
        return;
      }

      if (msg.type === 'tool_result') {
        updateToolResult(msg.tool_name || '', msg.content || '');
        return;
      }

      if (msg.type === 'done') {
        activityBar.classList.add('hidden');
        activeBubbles.clear();
        activeSubBubbles.clear();
        knownSubagents.clear();
        pendingToolEntries.clear();
        pendingPills.clear();
        bubbleToolGroups.clear();
        subagentGroups.clear();
        return;
      }

      if (msg.type === 'error') {
        addMessage({ agent: 'system', content: `ERROR: ${msg.content}` });
        return;
      }

      if (msg.type === 'message' && msg.content) {
        addMessage({ agent, content: msg.content });
        return;
      }
    }

    function createBubble(agent, customLabel) {
      const cfg = AGENTS[agent] || AGENTS.system;
      const bubble = document.createElement('div');
      const bid = 'bubble-' + (++bubbleIdCounter);
      bubble.id = bid;
      bubble.className = `msg-card ${cfg.borderClass}`;
      currentBubbleId = bid;

      const label = customLabel || cfg.label();
      const badgeClass = customLabel ? 'badge-subagent' : cfg.badgeClass;

      bubble.innerHTML = `
        <div class="flex items-center gap-2 mb-1">
          <span class="badge ${badgeClass}">${label}</span>
        </div>
        <div class="msg-content text-sm" style="white-space:pre-wrap;word-break:break-word"></div>
      `;
      if (!currentGroup) {
        currentGroup = document.createElement('div');
        currentGroup.className = 'exchange-group';
        messagesEl.insertBefore(currentGroup, messagesEl.firstChild);
      }
      currentGroup.insertBefore(bubble, currentGroup.firstChild);
      messagesEl.scrollTop = 0;
      return bubble;
    }

    function addMessage({ agent, content, badgeClass, badgeLabel }) {
      const cfg = AGENTS[agent] || AGENTS.system;
      const bubble = document.createElement('div');
      bubble.className = `msg-card ${cfg.borderClass}`;

      const bClass = badgeClass || cfg.badgeClass;
      const bLabel = badgeLabel || cfg.label();

      bubble.innerHTML = `
        <div class="flex items-center gap-2 mb-1">
          <span class="badge ${bClass}">${bLabel}</span>
        </div>
        <div class="msg-content text-sm" style="white-space:pre-wrap;word-break:break-word">${escapeHtml(content)}</div>
      `;
      if (!currentGroup || currentGroup.querySelectorAll('.msg-card').length >= 4) {
        currentGroup = document.createElement('div');
        currentGroup.className = 'exchange-group';
        messagesEl.insertBefore(currentGroup, messagesEl.firstChild);
      }
      currentGroup.insertBefore(bubble, currentGroup.firstChild);
      messagesEl.scrollTop = 0;
    }

    /* ---- Collapse All Tool Activity ---- */

    let allCollapsed = false;
    document.getElementById('collapse-all-btn').addEventListener('click', () => {
      allCollapsed = !allCollapsed;
      const btn = document.getElementById('collapse-all-btn');
      btn.textContent = allCollapsed ? 'EXPAND ALL' : 'COLLAPSE ALL';
      toolFeed.querySelectorAll('.tool-entry').forEach(entry => {
        if (allCollapsed) {
          entry.classList.add('collapsed');
          const tb = entry.querySelector('.tool-entry-toggle');
          if (tb) tb.textContent = '+';
        } else {
          entry.classList.remove('collapsed');
          const tb = entry.querySelector('.tool-entry-toggle');
          if (tb) tb.textContent = '-';
        }
      });
      toolFeed.querySelectorAll('.subagent-group').forEach(group => {
        if (allCollapsed) group.classList.add('collapsed');
        else group.classList.remove('collapsed');
      });
    });

    /* ---- Drag-to-Resize Handle ---- */

    const resizeHandle = document.getElementById('resize-handle');
    const toolPanel = document.getElementById('tool-panel');
    let isResizing = false;

    resizeHandle.addEventListener('mousedown', (e) => {
      isResizing = true;
      resizeHandle.classList.add('dragging');
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
      e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
      if (!isResizing) return;
      const containerRect = document.querySelector('.main-split').getBoundingClientRect();
      const newWidth = containerRect.right - e.clientX;
      const clamped = Math.max(180, Math.min(600, newWidth));
      toolPanel.style.width = clamped + 'px';
    });

    document.addEventListener('mouseup', () => {
      if (isResizing) {
        isResizing = false;
        resizeHandle.classList.remove('dragging');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
      }
    });

    /* ---- Tool Activity Panel ---- */

    const activeSubBubbles = new Map();
    const subagentGroups = new Map(); // agentId -> group DOM element
    const pendingPills = new Map(); // toolName -> { pill, detail } in chat bubble

    function scrollToBubble(entry) {
      const bid = entry.dataset.bubbleId;
      if (!bid) return;
      const bubble = document.getElementById(bid);
      if (!bubble) return;
      bubble.scrollIntoView({ behavior: 'smooth', block: 'center' });
      bubble.classList.remove('highlight-flash');
      void bubble.offsetWidth;
      bubble.classList.add('highlight-flash');
    }

    function scrollToToolEntry(entry) {
      entry.scrollIntoView({ behavior: 'smooth', block: 'center' });
      entry.style.boxShadow = '0 0 0 1px var(--neon-amber), 0 0 8px rgba(255,170,0,0.3)';
      setTimeout(() => { entry.style.boxShadow = ''; }, 1500);
    }

    // Track grouped pills per bubble: bubbleId -> Map<toolName, { wrapper, pill, callsList, calls: [{item, toolEntry}], totalCount }>
    const bubbleToolGroups = new Map();

    function getOrCreateBubbleCommands(bubbleId) {
      if (!bubbleId) return null;
      const bubble = document.getElementById(bubbleId);
      if (!bubble) return null;
      let container = bubble.querySelector('.bubble-commands');
      if (!container) {
        container = document.createElement('div');
        container.className = 'bubble-commands';

        const header = document.createElement('div');
        header.className = 'bubble-commands-header';
        header.innerHTML = `<span class="bc-arrow">&#9654;</span><span class="bc-label">TOOLS</span><span class="bc-count">0</span>`;
        header.addEventListener('click', () => container.classList.toggle('open'));

        const groups = document.createElement('div');
        groups.className = 'bubble-commands-groups';

        container.appendChild(header);
        container.appendChild(groups);
        bubble.appendChild(container);

        if (!bubbleToolGroups.has(bubbleId)) bubbleToolGroups.set(bubbleId, new Map());
      }
      return container;
    }

    function updateBubbleCommandsCount(bubbleId) {
      const bubble = document.getElementById(bubbleId);
      if (!bubble) return;
      const container = bubble.querySelector('.bubble-commands');
      if (!container) return;
      const groupMap = bubbleToolGroups.get(bubbleId);
      if (!groupMap) return;
      let total = 0;
      groupMap.forEach(g => total += g.totalCount);
      const countEl = container.querySelector('.bc-count');
      if (countEl) countEl.textContent = total;
    }

    function addCommandPill(toolName, toolInput, bubbleId, toolEntry) {
      const container = getOrCreateBubbleCommands(bubbleId);
      if (!container || !bubbleId) return;

      const groupsEl = container.querySelector('.bubble-commands-groups');
      if (!groupsEl) return;

      const groupMap = bubbleToolGroups.get(bubbleId);
      let group = groupMap.get(toolName);

      if (!group) {
        // Create new group wrapper for this tool name
        const wrapper = document.createElement('div');
        wrapper.className = 'cmd-group-wrapper';

        const pill = document.createElement('span');
        pill.className = 'cmd-group-pill';
        pill.innerHTML = `<span class="cmd-dot"></span>${escapeHtml(toolName)}<span class="cmd-group-count"></span>`;
        pill.addEventListener('click', (e) => {
          e.stopPropagation();
          wrapper.classList.toggle('open');
        });

        const callsList = document.createElement('div');
        callsList.className = 'cmd-group-calls';

        wrapper.appendChild(pill);
        wrapper.appendChild(callsList);
        groupsEl.appendChild(wrapper);

        group = { wrapper, pill, callsList, calls: [], totalCount: 0 };
        groupMap.set(toolName, group);
      }

      // Add individual call item
      group.totalCount++;
      const callIndex = group.totalCount;
      const inputSnippet = toolInput ? JSON.stringify(toolInput).slice(0, 80) : '';

      const item = document.createElement('div');
      item.className = 'cmd-call-item';
      item.innerHTML = `<span class="call-dot"></span>#${callIndex}`;
      item.title = inputSnippet;
      if (toolEntry) {
        item.addEventListener('click', (e) => {
          e.stopPropagation();
          scrollToToolEntry(toolEntry);
        });
      }
      group.callsList.appendChild(item);
      group.calls.push({ item, toolEntry });

      // Update count badge on group pill (hide if only 1)
      const countSpan = group.pill.querySelector('.cmd-group-count');
      if (countSpan) countSpan.textContent = group.totalCount > 1 ? `\u00D7${group.totalCount}` : '';

      // Update the group pill done state
      group.pill.classList.remove('all-done');

      updateBubbleCommandsCount(bubbleId);

      return { pill: group.pill, callItem: item, group };
    }

    function getOrCreateSubagentGroup(agentId) {
      if (subagentGroups.has(agentId)) return subagentGroups.get(agentId);

      const group = document.createElement('div');
      group.className = 'subagent-group';

      const header = document.createElement('div');
      header.className = 'subagent-group-header';
      header.innerHTML = `
        <span class="sg-dot"></span>
        <span class="sg-name">SUB: ${escapeHtml(agentId)}</span>
        <span class="sg-count">0</span>
        <span class="sg-arrow">&#9660;</span>
      `;
      header.addEventListener('click', () => {
        group.classList.toggle('collapsed');
      });

      const body = document.createElement('div');
      body.className = 'subagent-group-body';

      group.appendChild(header);
      group.appendChild(body);
      toolFeed.prepend(group);
      subagentGroups.set(agentId, group);
      return group;
    }

    function updateSubagentGroupCount(agentId) {
      const group = subagentGroups.get(agentId);
      if (!group) return;
      const body = group.querySelector('.subagent-group-body');
      const count = body ? body.children.length : 0;
      const countEl = group.querySelector('.sg-count');
      if (countEl) countEl.textContent = count;
    }

    function markSubagentGroupDone(agentId) {
      const group = subagentGroups.get(agentId);
      if (!group) return;
      const header = group.querySelector('.subagent-group-header');
      if (header) header.classList.add('done');
    }

    function addSubagentOutput(agentId, text) {
      const group = getOrCreateSubagentGroup(agentId);
      let entry = activeSubBubbles.get(agentId);
      if (!entry) {
        entry = document.createElement('div');
        entry.className = 'tool-entry tool-delegation clickable';
        if (currentBubbleId) entry.dataset.bubbleId = currentBubbleId;
        entry.addEventListener('click', () => scrollToBubble(entry));

        const header = document.createElement('div');
        header.className = 'tool-entry-header';

        const dot = document.createElement('div');
        dot.className = 'tool-entry-status';

        const name = document.createElement('span');
        name.className = 'tool-entry-name';
        name.textContent = 'OUTPUT';

        const toggleBtn = document.createElement('button');
        toggleBtn.className = 'tool-entry-toggle';
        toggleBtn.textContent = '-';
        toggleBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          const collapsed = entry.classList.toggle('collapsed');
          toggleBtn.textContent = collapsed ? '+' : '-';
        });

        header.appendChild(dot);
        header.appendChild(name);
        header.appendChild(toggleBtn);

        const resultDiv = document.createElement('div');
        resultDiv.className = 'tool-entry-result';
        resultDiv.style.maxHeight = '6rem';

        entry.appendChild(header);
        entry.appendChild(resultDiv);

        const body = group.querySelector('.subagent-group-body');
        body.prepend(entry);
        activeSubBubbles.set(agentId, entry);
        updateSubagentGroupCount(agentId);
      }
      const resultDiv = entry.querySelector('.tool-entry-result');
      resultDiv.textContent += text;
      resultDiv.scrollTop = resultDiv.scrollHeight;
      toolFeed.scrollTop = 0;
    }

    function addToolEntry(toolName, toolInput) {
      toolCallCount++;
      toolCountEl.textContent = toolCallCount;

      const isDelegation = toolName === 'delegate_to_subagent';
      const isProgress = toolName === 'report_progress' || toolName === 'check_subagents';

      const entry = document.createElement('div');
      entry.className = `tool-entry clickable${isDelegation ? ' tool-delegation' : ''}${isProgress ? ' tool-progress' : ''}`;
      if (currentBubbleId) entry.dataset.bubbleId = currentBubbleId;
      entry.addEventListener('click', () => scrollToBubble(entry));

      const inputStr = toolInput ? JSON.stringify(toolInput, null, 2) : '';
      const truncInput = inputStr.length > 200 ? inputStr.slice(0, 200) + '...' : inputStr;

      const header = document.createElement('div');
      header.className = 'tool-entry-header';

      const dot = document.createElement('div');
      dot.className = 'tool-entry-status';

      const nameSpan = document.createElement('span');
      nameSpan.className = 'tool-entry-name';
      nameSpan.textContent = toolName;

      const toggleBtn = document.createElement('button');
      toggleBtn.className = 'tool-entry-toggle';
      toggleBtn.textContent = '-';
      toggleBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        const collapsed = entry.classList.toggle('collapsed');
        toggleBtn.textContent = collapsed ? '+' : '-';
      });

      header.appendChild(dot);
      header.appendChild(nameSpan);
      header.appendChild(toggleBtn);
      entry.appendChild(header);

      if (truncInput) {
        const inputDiv = document.createElement('div');
        inputDiv.className = 'tool-entry-input';
        inputDiv.textContent = truncInput;
        entry.appendChild(inputDiv);
      }

      // If this is a sub-agent tool call, nest it in the group
      if (isDelegation && toolInput && toolInput.agent_id) {
        const group = getOrCreateSubagentGroup(toolInput.agent_id);
        const body = group.querySelector('.subagent-group-body');
        body.prepend(entry);
        updateSubagentGroupCount(toolInput.agent_id);
      } else {
        toolFeed.prepend(entry);
      }
      toolFeed.scrollTop = 0;
      pendingToolEntries.set(toolName, entry);

      // Add command pill in the chat bubble
      const pillData = addCommandPill(toolName, toolInput, currentBubbleId, entry);
      if (pillData) pendingPills.set(toolName, pillData);
    }

    function updateToolResult(toolName, result) {
      let entry = pendingToolEntries.get(toolName);
      if (!entry) {
        entry = document.createElement('div');
        entry.className = 'tool-entry clickable';
        if (currentBubbleId) entry.dataset.bubbleId = currentBubbleId;
        entry.addEventListener('click', () => scrollToBubble(entry));

        const header = document.createElement('div');
        header.className = 'tool-entry-header';

        const dot = document.createElement('div');
        dot.className = 'tool-entry-status done';

        const nameSpan = document.createElement('span');
        nameSpan.className = 'tool-entry-name';
        nameSpan.textContent = toolName || 'RESULT';

        const toggleBtn = document.createElement('button');
        toggleBtn.className = 'tool-entry-toggle';
        toggleBtn.textContent = '-';
        toggleBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          const collapsed = entry.classList.toggle('collapsed');
          toggleBtn.textContent = collapsed ? '+' : '-';
        });

        header.appendChild(dot);
        header.appendChild(nameSpan);
        header.appendChild(toggleBtn);
        entry.appendChild(header);
        toolFeed.prepend(entry);
      }

      // Mark as done
      const dot = entry.querySelector('.tool-entry-status');
      if (dot) dot.classList.add('done');

      // Add result
      const truncResult = result.length > 500 ? result.slice(0, 500) + '...' : result;
      const resultDiv = document.createElement('div');
      resultDiv.className = 'tool-entry-result';
      resultDiv.textContent = truncResult;
      entry.appendChild(resultDiv);

      pendingToolEntries.delete(toolName);

      // Update the command pill in the chat bubble
      const pillData = pendingPills.get(toolName);
      if (pillData) {
        // Mark individual call item as done
        if (pillData.callItem) pillData.callItem.classList.add('done');
        // Check if all calls in this group are done
        if (pillData.group) {
          const allDone = pillData.group.calls.every(c => c.item.classList.contains('done'));
          if (allDone) pillData.group.pill.classList.add('all-done');
        }
        pendingPills.delete(toolName);
      }

      toolFeed.scrollTop = 0;
    }

    /* ---- Form Submit (always active, never blocked) ---- */

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      placeholder.remove();

      addMessage({ agent: 'user', content: text });

      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'message', content: text }));
        // Clear active bubbles so the agent's next response gets a fresh bubble
        activeBubbles.clear();
        currentGroup = null;
      }
    });

    /* ---- Init ---- */

    fetchPersona();
    fetchStatus();
    connect();

    setInterval(fetchStatus, 30000);

    // Close panels on outside click
    document.addEventListener('click', (e) => {
      if (!settingsPanel.contains(e.target) && !settingsToggle.contains(e.target) && !personaPanel.contains(e.target) && !personaManagerBtn.contains(e.target)) {
        settingsPanel.classList.add('closed');
        settingsPanel.classList.remove('open');
      }
    });
